<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <!-- ===== Header ===== -->
    <header>
      <div class="container">
        <h1>Review Analyzer</h1>
        <span class="badge">NLP Service</span>
      </div>
    </header>

    <!-- ===== Main ===== -->
    <main class="container">
      <!-- ===== Form Card ===== -->
      <section class="card" id="review-form-section">
        <h2>✍️ Submit a Review</h2>

        <form id="review-form" novalidate>
          <div class="form-group">
            <label for="review-text">Review Text</label>
            <span class="hint"
              >Write your product review in 3–120 characters.</span
            >
            <textarea
              id="review-text"
              name="text"
              placeholder="This product is amazing! It exceeded my expectations."
              minlength="3"
              maxlength="120"
              required
              aria-describedby="text-hint"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="product-name">Product Name</label>
            <span class="hint"
              >Name of the product being reviewed (max 64 characters).</span
            >
            <input
              id="product-name"
              name="productName"
              type="text"
              placeholder="SuperWidget 3000"
              minlength="1"
              maxlength="64"
              required
            />
          </div>

          <div class="toggle-group">
            <input type="checkbox" id="translation-toggle" />
            <label for="translation-toggle"
              >Translate from another language</label
            >
            <span class="hint">(optional)</span>
          </div>

          <div
            id="translation-options"
            role="region"
            aria-labelledby="translation-toggle"
          >
            <div class="form-group">
              <label for="source-language">Source Language Code</label>
              <span class="hint"
                >e.g. <code>es</code> for Spanish, <code>fr</code> for French,
                or <code>auto</code> for auto-detect.</span
              >
              <input
                id="source-language"
                name="sourceLanguage"
                type="text"
                placeholder="es"
                minlength="2"
                maxlength="5"
              />
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-submit"
            id="submit-btn"
          >
            Analyze Review
          </button>
        </form>
      </section>

      <!-- ===== Leaderboard Card ===== -->
      <section class="card" id="leaderboard-section" aria-live="polite">
        <div class="leaderboard-header">
          <h2>🏆 Product Leaderboard</h2>
          <button
            class="btn btn-secondary btn-sm"
            id="leaderboard-refresh-btn"
            type="button"
          >
            🔄 Refresh
          </button>
        </div>

        <div id="leaderboard-content">
          <div class="leaderboard-loading">
            <span class="spinner spinner-dark"></span>
            Loading leaderboard…
          </div>
        </div>
      </section>

      <!-- ===== Result Card ===== -->
      <section class="card" id="result-section" aria-live="polite">
        <h2>📊 Analysis Result</h2>

        <div id="result-content">
          <!-- populated by JS -->
        </div>
      </section>
    </main>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast" role="alert">
      <span id="toast-message"></span>
      <button class="toast-close" id="toast-close" aria-label="Dismiss">
        &times;
      </button>
    </div>

    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
